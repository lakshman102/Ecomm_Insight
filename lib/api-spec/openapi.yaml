openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShopWave E-Commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: cart
    description: Shopping cart operations
  - name: wishlist
    description: Wishlist operations
  - name: orders
    description: Order operations
  - name: reviews
    description: Review operations
  - name: dashboard
    description: Dashboard summary

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: integer }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: sort
          in: query
          schema: { type: string, enum: [newest, price_asc, price_desc, rating, popular] }
        - name: featured
          in: query
          schema: { type: boolean }
        - name: onSale
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/trending:
    get:
      operationId: getTrendingProducts
      tags: [products]
      summary: Get trending products
      responses:
        "200":
          description: Trending products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductPatch"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart items
      responses:
        "200":
          description: Cart items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "201":
          description: Cart item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear entire cart
      responses:
        "204":
          description: Cart cleared

  /cart/{id}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemPatch"
      responses:
        "200":
          description: Updated cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get wishlist
      responses:
        "200":
          description: Wishlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WishlistItem"
    post:
      operationId: addToWishlist
      tags: [wishlist]
      summary: Add to wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistInput"
      responses:
        "201":
          description: Added to wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistItem"

  /wishlist/{productId}:
    delete:
      operationId: removeFromWishlist
      tags: [wishlist]
      summary: Remove from wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusPatch"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a product
      parameters:
        - name: productId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      required: [id, name, description, price, categoryId, stock, imageUrl, rating, reviewCount, featured, createdAt]
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string }
        price:       { type: number }
        salePrice:   { type: ["number", "null"] }
        categoryId:  { type: integer }
        categoryName: { type: ["string", "null"] }
        stock:       { type: integer }
        imageUrl:    { type: string }
        images:      { type: array, items: { type: string } }
        rating:      { type: number }
        reviewCount: { type: integer }
        featured:    { type: boolean }
        tags:        { type: array, items: { type: string } }
        createdAt:   { type: string }

    ProductInput:
      type: object
      required: [name, description, price, categoryId, stock, imageUrl]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        price:       { type: number }
        salePrice:   { type: ["number", "null"] }
        categoryId:  { type: integer }
        stock:       { type: integer }
        imageUrl:    { type: string }
        images:      { type: array, items: { type: string } }
        featured:    { type: boolean }
        tags:        { type: array, items: { type: string } }

    ProductPatch:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        price:       { type: number }
        salePrice:   { type: ["number", "null"] }
        categoryId:  { type: integer }
        stock:       { type: integer }
        imageUrl:    { type: string }
        images:      { type: array, items: { type: string } }
        featured:    { type: boolean }
        tags:        { type: array, items: { type: string } }

    Category:
      type: object
      required: [id, name, slug, description, imageUrl, productCount]
      properties:
        id:           { type: integer }
        name:         { type: string }
        slug:         { type: string }
        description:  { type: string }
        imageUrl:     { type: string }
        productCount: { type: integer }

    CategoryInput:
      type: object
      required: [name, slug, description, imageUrl]
      properties:
        name:        { type: string, minLength: 1 }
        slug:        { type: string, minLength: 1 }
        description: { type: string }
        imageUrl:    { type: string }

    CartItem:
      type: object
      required: [id, productId, quantity, product]
      properties:
        id:        { type: integer }
        productId: { type: integer }
        quantity:  { type: integer }
        product:
          $ref: "#/components/schemas/Product"

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer }
        quantity:  { type: integer }

    CartItemPatch:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer }

    WishlistItem:
      type: object
      required: [id, productId, product, createdAt]
      properties:
        id:        { type: integer }
        productId: { type: integer }
        product:
          $ref: "#/components/schemas/Product"
        createdAt: { type: string }

    WishlistInput:
      type: object
      required: [productId]
      properties:
        productId: { type: integer }

    Order:
      type: object
      required: [id, items, subtotal, total, status, shippingAddress, createdAt]
      properties:
        id:              { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:        { type: number }
        shippingCost:    { type: number }
        total:           { type: number }
        status:          { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
        shippingAddress: { type: string }
        paymentMethod:   { type: string }
        createdAt:       { type: string }

    OrderItem:
      type: object
      required: [id, productId, quantity, price, productName, productImage]
      properties:
        id:           { type: integer }
        productId:    { type: integer }
        quantity:     { type: integer }
        price:        { type: number }
        productName:  { type: string }
        productImage: { type: string }

    OrderInput:
      type: object
      required: [shippingAddress, paymentMethod]
      properties:
        shippingAddress: { type: string }
        paymentMethod:   { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer }
        quantity:  { type: integer }

    OrderStatusPatch:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, processing, shipped, delivered, cancelled] }

    Review:
      type: object
      required: [id, productId, rating, comment, authorName, createdAt]
      properties:
        id:         { type: integer }
        productId:  { type: integer }
        rating:     { type: integer }
        comment:    { type: string }
        authorName: { type: string }
        createdAt:  { type: string }

    ReviewInput:
      type: object
      required: [productId, rating, comment, authorName]
      properties:
        productId:  { type: integer }
        rating:     { type: integer }
        comment:    { type: string }
        authorName: { type: string }

    DashboardSummary:
      type: object
      required: [totalProducts, totalOrders, totalRevenue, totalCategories, recentOrders, topProducts, ordersByStatus]
      properties:
        totalProducts:   { type: integer }
        totalOrders:     { type: integer }
        totalRevenue:    { type: number }
        totalCategories: { type: integer }
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count:  { type: integer }
