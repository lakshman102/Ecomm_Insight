kind = "web"
previewPath = "/"
title = "ShopWave E-Commerce"
version = "1.0.0"
id = "artifacts/shopwave"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23798

[services.development]
run = "pnpm --filter @workspace/shopwave run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shopwave", "run", "build" ]
publicDir = "artifacts/shopwave/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23798"
BASE_PATH = "/"
